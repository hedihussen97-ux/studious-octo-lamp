<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brothers Cup Pro 🏆</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #00d2ff; --bg: #0b0f19; --card: #161e2d; --white: #ffffff; }
        body { font-family: 'Tahoma', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding-bottom: 90px; }
        .page { display: none; padding: 20px; animation: fadeIn 0.4s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .match-card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid #2d3748; }
        .stadium-name { text-align: center; font-size: 0.75rem; color: #8892b0; margin-bottom: 10px; }
        .teams-grid { display: grid; grid-template-columns: 1fr 50px 1fr; align-items: center; text-align: center; }
        .team img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 5px; background: #fff; border-radius: 50%; padding: 2px; }
        .team span { display: block; font-size: 0.85rem; font-weight: bold; }
        .odds-row { display: flex; gap: 8px; margin-top: 15px; }
        .odd-btn { flex: 1; background: #1f2937; padding: 10px; border-radius: 12px; cursor: pointer; border: 2px solid transparent; text-align: center; font-size: 0.75rem; transition: 0.3s; }
        .odd-btn span { display: block; color: var(--p); font-weight: bold; margin-top: 2px; }
        .odd-btn:hover { border-color: var(--p); background: #263345; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #111827; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1f2937; z-index: 100; }
        .nav-btn { color: #64748b; cursor: pointer; font-size: 0.9rem; }
        .nav-btn.active { color: var(--p); font-weight: bold; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <h2 style="text-align:center; color:var(--p)">پڕۆفایلی یاریزان 👤</h2>
        <div class="match-card" style="text-align:center">
            <h3 id="uNameDisplay">میوان</h3>
            <div id="setupForm">
                <input type="text" id="nameInp" placeholder="ناوەکەت بنووسە..." style="width:80%; padding:10px; border-radius:8px; border:none; background:#1f2937; color:white; outline:none; text-align:center;">
                <button onclick="saveUser()" style="width:85%; padding:10px; background:var(--p); border:none; border-radius:8px; margin-top:10px; font-weight:bold; cursor:pointer;">چوونە ژوورەوە</button>
            </div>
        </div>
    </div>

    <div id="predict" class="page">
        <h2 style="color:var(--p); text-align:center;">⚽ پێشبینییەکان</h2>
        <div id="matchList"></div>
    </div>

    <div class="nav">
        <div class="nav-btn active" id="nav-home" onclick="showPage('home')">پڕۆفایل</div>
        <div class="nav-btn" id="nav-predict" onclick="showPage('predict')">پێشبینی</div>
    </div>

    <script>
        // زانیارییە نوێیەکانت لێرە جێگیر کراون
        const SB_URL = "https://wlzozadahonjvcodzokyu.supabase.co"; 
        const SB_KEY = "sb_publishable_B4ommmZx0sf4iWMujMTtcQ_C3lap4ZI";

        const { createClient } = supabase;
        const _supabase = createClient(SB_URL, SB_KEY);

        const matches = [
            { id: 1, t1: "ئەیسی میلان", logo1: "https://upload.wikimedia.org/wikipedia/commons/d/d0/Logo_of_AC_Milan.svg", t2: "ئینتەر میلان", logo2: "https://upload.wikimedia.org/wikipedia/commons/0/05/FC_Internazionale_Milano_2021.svg", stadium: "San Siro 🏟️", p1: 4, px: 2, p2: 3 },
            { id: 2, t1: "لیڤەرپوول", logo1: "https://upload.wikimedia.org/wikipedia/en/0/0c/Liverpool_FC.svg", t2: "ڕیاڵ مەدرید", logo2: "https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg", stadium: "Anfield 🏟️", p1: 3, px: 2, p2: 4 }
        ];

        function renderMatches() {
            const list = document.getElementById('matchList');
            list.innerHTML = matches.map(m => `
                <div class="match-card">
                    <div class="stadium-name">${m.stadium}</div>
                    <div class="teams-grid">
                        <div class="team"><img src="${m.logo1}"><span>${m.t1}</span></div>
                        <div style="font-weight:bold; color:var(--p)">VS</div>
                        <div class="team"><img src="${m.logo2}"><span>${m.t2}</span></div>
                    </div>
                    <div class="odds-row">
                        <div class="odd-btn" onclick="makeP('${m.id}','t1')">بردنەوەی ١<span>${m.p1} خاڵ</span></div>
                        <div class="odd-btn" onclick="makeP('${m.id}','x')">یەکسان<span>${m.px} خاڵ</span></div>
                        <div class="odd-btn" onclick="makeP('${m.id}','t2')">بردنەوەی ٢<span>${m.p2} خاڵ</span></div>
                    </div>
                </div>`).join('');
        }

        function saveUser() {
            const name = document.getElementById('nameInp').value;
            if(name.trim()) { 
                localStorage.setItem('user', name); 
                updateProfileUI();
            }
        }

        async function makeP(mId, choice) {
            const user = localStorage.getItem('user');
            if(!user) return alert("سەرەتا ناوەکەت تۆمار بکە!");

            try {
                const { error } = await _supabase
                    .from('Predictions') 
                    .upsert({ 
                        user_name: user, 
                        match_id: mId, 
                        prediction: choice 
                    }, { onConflict: 'user_name,match_id' });

                if(error) throw error;
                alert("سەرکەوتوو بوو! ✅");
            } catch (err) {
                alert("هەڵە: " + err.message);
            }
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
            if(id === 'predict') renderMatches();
        }

        function updateProfileUI() {
            const u = localStorage.getItem('user');
            if(u) { 
                document.getElementById('uNameDisplay').innerText = u; 
                document.getElementById('setupForm').style.display = "none"; 
            }
        }

        updateProfileUI();
        renderMatches();
    </script>
</body>
</html>
