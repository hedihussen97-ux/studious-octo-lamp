                    <!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brothers Cup Pro 🏆</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #00d2ff; --bg: #0b0f19; --card: #161e2d; --white: #ffffff; }
        body { font-family: 'Tahoma', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding-bottom: 90px; }
        .page { display: none; padding: 20px; animation: fadeIn 0.4s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .match-card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid #2d3748; }
        .stadium-name { text-align: center; font-size: 0.75rem; color: #8892b0; margin-bottom: 10px; }
        .teams-grid { display: grid; grid-template-columns: 1fr 50px 1fr; align-items: center; text-align: center; }
        .team img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 5px; }
        .team span { display: block; font-size: 0.85rem; font-weight: bold; }
        .odds-row { display: flex; gap: 8px; margin-top: 15px; }
        .odd-btn { flex: 1; background: #1f2937; padding: 8px; border-radius: 12px; cursor: pointer; border: 2px solid transparent; text-align: center; font-size: 0.75rem; transition: 0.3s; }
        .odd-btn span { display: block; color: var(--p); font-weight: bold; margin-top: 2px; }
        .odd-btn:hover { border-color: var(--p); background: #263345; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #111827; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1f2937; z-index: 100; }
        .nav-btn { color: #64748b; cursor: pointer; font-size: 0.9rem; }
        .nav-btn.active { color: var(--p); font-weight: bold; }
        .rank-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #2d3748; background: #1a2234; margin-bottom: 5px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <h2 style="text-align:center; color:var(--p)">پڕۆفایلی یاریزان 👤</h2>
        <div class="match-card" style="text-align:center">
            <div style="width:70px; height:70px; background:var(--p); border-radius:50%; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; font-size:1.5rem; color:#000">👤</div>
            <h3 id="uNameDisplay">میوان</h3>
            <div id="setupForm">
                <input type="text" id="nameInp" placeholder="ناوەکەت بنووسە..." style="width:80%; padding:10px; border-radius:8px; border:none; background:#1f2937; color:white; outline:none;">
                <button onclick="saveUser()" style="width:85%; padding:10px; background:var(--p); border:none; border-radius:8px; margin-top:10px; font-weight:bold; cursor:pointer;">چوونە ژوورەوە</button>
            </div>
        </div>
    </div>

    <div id="predict" class="page">
        <h2 style="color:var(--p)">⚽ پێشبینییەکان</h2>
        <div id="matchList"></div>
    </div>

    <div id="ranks" class="page">
        <h2 style="color:var(--p)">📊 ڕیزبەندی گشتی</h2>
        <div id="rankList">خەریکە خاڵەکان ئەژمار دەکەم...</div>
    </div>

    <div class="nav">
        <div class="nav-btn active" onclick="showPage('home', this)">پڕۆفایل</div>
        <div class="nav-btn" onclick="showPage('predict', this)">پێشبینی</div>
        <div class="nav-btn" onclick="showPage('ranks', this)">ڕیزبەندی</div>
    </div>

    <script>
        const SB_URL = "https://B4ommmZx0sf4iWMujMTtcQ.supabase.co"; 
        const SB_KEY = "sb_publishable_B4ommmZx0sf4iWMujMTtcQ_C3lap4ZI";
        const { createClient } = supabase;
        const _supabase = createClient(SB_URL, SB_KEY);

        const matches = [
            { id: 1, t1: "ئینتەر میلان", logo1: "https://upload.wikimedia.org/wikipedia/commons/0/05/FC_Internazionale_Milano_2021.svg", t2: "ئەیسی میلان", logo2: "https://upload.wikimedia.org/wikipedia/commons/d/d0/Logo_of_AC_Milan.svg", stadium: "San Siro", p1: 3, px: 3, p2: 4 },
            { id: 2, t1: "وێستهام", logo1: "https://upload.wikimedia.org/wikipedia/en/c/c2/West_Ham_United_FC_logo.svg", t2: "برێنتفۆرد", logo2: "https://upload.wikimedia.org/wikipedia/en/2/2a/Brentford_FC_crest.svg", stadium: "London Stadium", p1: 3, px: 2, p2: 4 },
            { id: 3, t1: "لیڤەرپووڵ", logo1: "https://upload.wikimedia.org/wikipedia/en/0/0c/Liverpool_FC.svg", t2: "گەلەتەسەرای", logo2: "https://upload.wikimedia.org/wikipedia/commons/3/31/Galatasaray_Star_Logo.svg", stadium: "Rams Park", p1: 2, px: 3, p2: 4 },
            { id: 4, t1: "بایرن میونشن", logo1: "https://upload.wikimedia.org/wikipedia/commons/1/1b/FC_Bayern_M%C3%BCnchen_logo_%282017%29.svg", t2: "ئەتڵانتا", logo2: "https://upload.wikimedia.org/wikipedia/en/6/66/Atalanta_BC_Logo.svg", stadium: "Gewiss Stadium", p1: 2, px: 3, p2: 5 },
            { id: 5, t1: "ئەتلەتیکۆ مەدرید", logo1: "https://upload.wikimedia.org/wikipedia/en/f/f4/Atletico_Madrid_2017_logo.svg", t2: "تۆتنهام", logo2: "https://upload.wikimedia.org/wikipedia/en/b/b4/Tottenham_Hotspur.svg", stadium: "Metropolitano", p1: 3, px: 4, p2: 5 },
            { id: 6, t1: "بارسێلۆنا", logo1: "https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_%28crest%29.svg", t2: "نیوکاسڵ", logo2: "https://upload.wikimedia.org/wikipedia/en/5/56/Newcastle_United_Logo.svg", stadium: "St James' Park", p1: 3, px: 2, p2: 4 },
            { id: 7, t1: "ئارسناڵ", logo1: "https://upload.wikimedia.org/wikipedia/en/5/53/Arsenal_FC.svg", t2: "لیڤەرکوزن", logo2: "https://upload.wikimedia.org/wikipedia/en/5/59/Bayer_04_Leverkusen_logo.svg", stadium: "BayArena", p1: 2, px: 3, p2: 5 },
            { id: 8, t1: "بۆدۆگلیمت", logo1: "https://upload.wikimedia.org/wikipedia/en/e/e3/FK_Bod%C3%B8_Glimt_logo.svg", t2: "لیشبۆنە", logo2: "https://upload.wikimedia.org/wikipedia/en/3/3e/Sporting_CP_logo.svg", stadium: "Aspmyra Stadion", p1: 3, px: 2, p2: 4 },
            { id: 9, t1: "پاریس", logo1: "https://upload.wikimedia.org/wikipedia/en/a/a7/Paris_Saint-Germain_F.C..svg", t2: "چێڵسی", logo2: "https://upload.wikimedia.org/wikipedia/en/c/cc/Chelsea_FC.svg", stadium: "Parc des Princes", p1: 3, px: 4, p2: 5 },
            { id: 10, t1: "مان سیتی", logo1: "https://upload.wikimedia.org/wikipedia/en/eb/eb/Manchester_City_FC_badge.svg", t2: "ڕیاڵ مەدرید", logo2: "https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg", stadium: "Santiago Bernabéu", p1: 3, px: 2, p2: 4 }
        ];

        function renderMatches() {
            const list = document.getElementById('matchList');
            list.innerHTML = matches.map(m => `
                <div class="match-card">
                    <div class="stadium-name">🏟️ ${m.stadium}</div>
                    <div class="teams-grid">
                        <div class="team"><img src="${m.logo1}"><span>${m.t1}</span></div>
                        <div style="font-weight:bold; color:var(--p)">VS</div>
                        <div class="team"><img src="${m.logo2}"><span>${m.t2}</span></div>
                    </div>
                    <div class="odds-row">
                        <div class="odd-btn" onclick="makeP('${m.id}','t1')">بردنەوەی ١<span>${m.p1} خاڵ</span></div>
                        <div class="odd-btn" onclick="makeP('${m.id}','x')">یەکسان<span>${m.px} خاڵ</span></div>
                        <div class="odd-btn" onclick="makeP('${m.id}','t2')">بردنەوەی ٢<span>${m.p2} خاڵ</span></div>
                    </div>
                </div>`).join('');
        }

        async function saveUser() {
            const name = document.getElementById('nameInp').value;
            if(name) { localStorage.setItem('user', name); location.reload(); }
        }

        async function makeP(mId, choice) {
            const user = localStorage.getItem('user');
            if(!user) return alert("سەرەتا ناوەکەت بنووسە!");
            const { error } = await _supabase.from('predictions').upsert({ user_name: user, match_id: mId, prediction: choice }, { onConflict: 'user_name,match_id' });
            if(error) alert("هەڵە ڕوویدا!"); else alert("پێشبینییەکەت تۆمارکرا! ✅");
        }

        // لێرەدا دەتوانیت دواتر ئەنجامی کۆتایی یارییەکان دابنێیت بۆ ئەوەی خاڵەکان ئەژمار بکرێن
        async function loadRanks() {
            const rList = document.getElementById('rankList');
            rList.innerHTML = "بەشی ڕیزبەندی دوای تەواوبوونی یارییەکان چالاک دەبێت 📊";
        }

        window.showPage = (id, btn) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id === 'predict') renderMatches();
            if(id === 'ranks') loadRanks();
        };

        const u = localStorage.getItem('user');
        if(u) { document.getElementById('uNameDisplay').innerText = u; document.getElementById('setupForm').style.display = "none"; }
        renderMatches();
    </script>
</body>
                                                                                </html>
